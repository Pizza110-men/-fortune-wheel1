<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Колесо Фортуны</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, addDoc, query, where, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBAj3-o_fNO52nuMrcmEREDM_eMJFp-cAY",
    authDomain: "wheel-text-1.firebaseapp.com",
    projectId: "wheel-text-1",
    storageBucket: "wheel-text-1.firebasestorage.app",
    messagingSenderId: "235048428878",
    appId: "1:235048428878:web:164aac7e182769eca9ea1f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let tgUser = null;
  let myBalance = 1000;
  let myId = null;
  let myName = 'Игрок';
  let freeSpinUsed = false;
  let stats = { games: 0, wins: 0 };
  let history = [];

  async function initUser() {
    try {
      const tg = window.Telegram.WebApp;
      tg.expand();
      tgUser = tg.initDataUnsafe?.user;
    } catch(e) {}

    if (tgUser && tgUser.id) {
      myId = 'tg_' + tgUser.id;
      myName = tgUser.first_name || 'Игрок';
    } else {
      myId = 'guest_' + Math.random().toString(36).slice(2,8);
      myName = 'Гость';
    }

    document.getElementById('profileName').textContent = myName;
    document.getElementById('profileInitial').textContent = myName.slice(0,1).toUpperCase();

    const ref = doc(db, 'users', myId);
    const snap = await getDoc(ref);
    if (snap.exists()) {
      const d = snap.data();
      myBalance = d.balance ?? 1000;
      freeSpinUsed = d.freeSpinUsed ?? false;
      stats = d.stats ?? { games: 0, wins: 0 };
    } else {
      await setDoc(ref, { name: myName, balance: myBalance, freeSpinUsed: false, stats: { games:0, wins:0 }, createdAt: Date.now() });
    }

    const hSnap = await getDocs(query(collection(db, 'history'), where('userId','==',myId), orderBy('ts','desc'), limit(20)));
    history = hSnap.docs.map(d => d.data());

    window._saveUser = saveUser;
    window._addHistory = addHistory;
    window._getHistory = () => history;
    window._getBalance = () => myBalance;
    window._setBalance = (v) => { myBalance = v; };
    window._getStats = () => stats;
    window._setStats = (v) => { stats = v; };
    window._getFreeSpinUsed = () => freeSpinUsed;
    window._setFreeSpinUsed = (v) => { freeSpinUsed = v; };
    window._myName = myName;
    window._myId = myId;

    document.dispatchEvent(new Event('userReady'));
  }

  async function saveUser() {
    const ref = doc(db, 'users', myId);
    await updateDoc(ref, { balance: myBalance, freeSpinUsed, stats });
  }

  async function addHistory(entry) {
    history.unshift(entry);
    await addDoc(collection(db, 'history'), { ...entry, userId: myId, ts: Date.now() });
  }

  initUser();
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0c1a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

  .screen { display: none; flex-direction: column; align-items: center; padding: 12px 12px 80px; min-height: calc(100vh - 56px); }
  .screen.active { display: flex; }

  .nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1628; border-top: 1px solid rgba(255,255,255,0.08); display: flex; height: 56px; z-index: 100; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; font-size: 10px; color: rgba(255,255,255,0.35); cursor: pointer; border: none; background: none; transition: color 0.2s; }
  .nav-btn.active { color: #a78bfa; }
  .nav-icon { font-size: 20px; }

  .round-bar { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 0.5px; text-transform: uppercase; }
  .round-bar span { color: #a78bfa; font-weight: 600; }

  .bank-bar { width: 100%; display: flex; justify-content: space-between; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 8px 14px; margin-bottom: 10px; font-size: 13px; }
  .bank-bar .label { color: rgba(255,255,255,0.4); }
  .bank-bar .val { color: #fbbf24; font-weight: 600; }

  .my-balance-bar { width: 100%; text-align: center; font-size: 12px; color: rgba(255,255,255,0.35); margin-bottom: 8px; }
  .my-balance-bar b { color: #a78bfa; }

  .wheel-wrap { position: relative; width: 270px; height: 270px; margin: 0 auto 14px; }
  .pointer { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 20px solid #f87171; z-index: 10; }
  .timer-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 80px; height: 80px; border-radius: 50%; background: #0f0c1a; border: 2px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: #fff; z-index: 5; pointer-events: none; }

  .winner-box { display: none; background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3); border-radius: 10px; padding: 10px 16px; text-align: center; margin-bottom: 10px; width: 100%; }
  .winner-box.show { display: block; }
  .winner-box .w-name { font-size: 15px; font-weight: 600; color: #34d399; }
  .winner-box .w-sub { font-size: 12px; color: rgba(52,211,153,0.7); margin-top: 2px; }

  .quick-bets { display: flex; gap: 6px; width: 100%; margin-bottom: 8px; }
  .qb { flex: 1; padding: 7px 4px; text-align: center; background: rgba(167,139,250,0.1); border: 1px solid rgba(167,139,250,0.25); border-radius: 8px; font-size: 12px; font-weight: 600; color: #a78bfa; cursor: pointer; }

  .players { display: flex; flex-direction: column; gap: 7px; width: 100%; }
  .player-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 9px 12px; display: flex; align-items: center; gap: 10px; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .p-info { flex: 1; min-width: 0; }
  .p-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .p-bet { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 1px; }
  .p-chance { font-size: 13px; font-weight: 700; flex-shrink: 0; }

  .profile-header { width: 100%; display: flex; align-items: center; gap: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 14px; margin-bottom: 14px; }
  .profile-avatar { width: 54px; height: 54px; border-radius: 50%; background: linear-gradient(135deg, #7c3aed, #4f46e5); display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; flex-shrink: 0; }
  .profile-name { font-size: 16px; font-weight: 600; }
  .profile-sub { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 3px; }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; width: 100%; margin-bottom: 14px; }
  .stat-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 10px 8px; text-align: center; }
  .stat-val { font-size: 20px; font-weight: 700; color: #a78bfa; }
  .stat-label { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }

  .free-spin-card { width: 100%; background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.25); border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .free-spin-icon { font-size: 28px; }
  .free-spin-info { flex: 1; }
  .free-spin-title { font-size: 13px; font-weight: 600; color: #fbbf24; }
  .free-spin-sub { font-size: 11px; color: rgba(251,191,36,0.6); margin-top: 2px; }
  .free-spin-btn { padding: 8px 14px; background: #fbbf24; color: #000; font-size: 12px; font-weight: 700; border-radius: 8px; border: none; cursor: pointer; white-space: nowrap; }

  .history-list { width: 100%; display: flex; flex-direction: column; gap: 8px; }
  .history-item { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
  .h-left .h-round { font-size: 13px; font-weight: 600; }
  .h-left .h-bet { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 2px; }
  .h-right { text-align: right; }
  .h-result { font-size: 14px; font-weight: 700; }
  .h-result.win { color: #34d399; }
  .h-result.lose { color: #f87171; }
  .h-time { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 2px; }

  .section-title { width: 100%; font-size: 11px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }

  .loading-screen { position: fixed; inset: 0; background: #0f0c1a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; gap: 16px; }
  .loading-screen .spin { font-size: 48px; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-screen p { color: rgba(255,255,255,0.5); font-size: 14px; }
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="spin">🎡</div>
  <p>Загружаем игру...</p>
</div>

<div class="screen active" id="screen-game">
  <div class="round-bar">
    <span>Игра #<span id="roundNum">1</span></span>
    <span id="roundStatus">Сбор ставок</span>
  </div>
  <div class="bank-bar">
    <span class="label">Банк раунда</span>
    <span class="val" id="bankVal">0 монет</span>

  </div>
  <div class="section-title">История</div>
  <div class="history-list" id="historyList2">
    <div style="color:rgba(255,255,255,0.3);font-size:13px;text-align:center;padding:20px 0">Нет игр</div>
  </div>
</div>

<nav class="nav">

  <button class="nav-btn" id="nav-history" onclick="showScreen('history')"><span class="nav-icon">📋</span><span>История</span></button>
  <button class="nav-btn" id="nav-profile" onclick="showScreen('profile')"><span class="nav-icon">👤</span><span>Профиль</span></button>

<script>
const COLORS = ['#7c3aed','#059669','#dc2626','#d97706'];
const TC = ['#ede9fe','#d1fae5','#fee2e2','#fef3c7'];

let PLAYERS = [];
let spinning = false;
let angle = 0;
let round = 1;
let timer = 30;
let timerInterval = null;
let ready = false;

document.addEventListener('userReady', () => {
  const bal = window._getBalance();
  const name = window._myName;
  PLAYERS = [
    { id:'you', name: name, color:COLORS[0], tc:TC[0], bet:0, balance: bal, bot:false },
    { id:'b1', name:'Алекс', color:COLORS[1], tc:TC[1], bet:0, balance:1000, bot:true },
    { id:'b2', name:'Катя',  color:COLORS[2], tc:TC[2], bet:0, balance:1000, bot:true },
    { id:'b3', name:'Макс',  color:COLORS[3], tc:TC[3], bet:0, balance:1000, bot:true },
  ];
  document.getElementById('loadingScreen').style.display = 'none';
  ready = true;
  botsBet();
  render();
  startTimer();
});

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if (name==='profile') updateProfile();
  if (name==='history') renderHistoryList('historyList');
}

function updateProfile() {
  const bal = PLAYERS[0]?.balance ?? window._getBalance();
  document.getElementById('profileBalance').textContent = 'Баланс: ' + bal + ' монет';
  const s = window._getStats();
  document.getElementById('statGames').textContent = s.games;
  document.getElementById('statWins').textContent = s.wins;
  document.getElementById('statWinrate').textContent = s.games>0 ? Math.round(s.wins/s.games*100)+'%' : '0%';
  document.getElementById('freeSpinCard').style.display = window._getFreeSpinUsed() ? 'none' : 'flex';
  renderHistoryList('historyList2');
}

function renderHistoryList(id) {
  const h = window._getHistory ? window._getHistory() : [];
  const el = document.getElementById(id);
  if (!h.length) { el.innerHTML='<div style="color:rgba(255,255,255,0.3);font-size:13px;text-align:center;padding:20px 0">Нет игр</div>'; return; }
  el.innerHTML = h.slice(0,15).map(e=>`
    <div class="history-item">
      <div class="h-left"><div class="h-round">Раунд #${e.round}</div><div class="h-bet">Ставка: ${e.bet} · Банк: ${e.bank}</div></div>
      <div class="h-right"><div class="h-result ${e.won?'win':'lose'}">${e.won?'+'+e.prize:'-'+e.bet}</div><div class="h-time">${e.time}</div></div>
    </div>`).join('');
}

function claimFreeSpin() {
  if (window._getFreeSpinUsed()) return;
  PLAYERS[0].balance += 100;
  window._setBalance(PLAYERS[0].balance);
  window._setFreeSpinUsed(true);
  window._saveUser?.();
  updateProfile();
  render();
}

function total() { return PLAYERS.reduce((s,p)=>s+p.bet,0); }
function pct(p) { const t=total(); return t===0?0:Math.round(p.bet/t*100); }

function render() {
  document.getElementById('bankVal').textContent = total()+' монет';
  document.getElementById('roundNum').textContent = round;
  document.getElementById('myBalanceShow').textContent = PLAYERS[0]?.balance ?? 0;
  const list = document.getElementById('playersList');
  list.innerHTML='';
  PLAYERS.forEach(p=>{
    const d=document.createElement('div');
    d.className='player-card';
    d.innerHTML=`<div class="avatar" style="background:${p.color}33;color:${p.color};">${p.name.slice(0,2).toUpperCase()}</div>
    <div class="p-info"><div class="p-name">${p.name}${p.bot?' <span style="font-size:10px;opacity:0.3">бот</span>':''}</div><div class="p-bet">${p.bet} монет · баланс ${p.balance}</div></div>
    <div class="p-chance" style="color:${p.color}">${pct(p)}%</div>`;
    list.appendChild(d);
  });
  drawWheel();
}

function drawWheel() {
  const c=document.getElementById('wheel');
  const ctx=c.getContext('2d');
  const cx=135,cy=135,r=132;
  ctx.clearRect(0,0,270,270);
  const t=total();
  if (t===0) {
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle='#1e1b2e';ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='13px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('Сделайте ставки',cx,cy);return;
  }
  let a=angle;
  PLAYERS.forEach(p=>{
    if (!p.bet) return;
    const slice=(p.bet/t)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,a,a+slice);ctx.closePath();
    ctx.fillStyle=p.color;ctx.fill();ctx.strokeStyle='#0f0c1a';ctx.lineWidth=2;ctx.stroke();
    const mid=a+slice/2;
    const tx=cx+Math.cos(mid)*r*0.65,ty=cy+Math.sin(mid)*r*0.65;
    ctx.fillStyle=p.tc;ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.name.split(' ')[0],tx,ty);
    if (slice>0.4){ctx.font='10px sans-serif';ctx.fillText(pct(p)+'%',tx,ty+14);}
    a+=slice;
  });
  ctx.beginPath();ctx.arc(cx,cy,38,0,Math.PI*2);ctx.fillStyle='#0f0c1a';ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;ctx.stroke();
}

function quickBet(v) {
  if (spinning) return;
  const me=PLAYERS[0];
  if (v==='allin') document.getElementById('betInput').value=me.balance;
  else document.getElementById('betInput').value=Math.min(v,me.balance);
}

function placeBet() {
  if (spinning||!ready) return;
  const amt=parseInt(document.getElementById('betInput').value)||0;
  const me=PLAYERS[0];
  if (amt<=0||amt>me.balance) return;
  me.bet+=amt;me.balance-=amt;
  render();
}

function botsBet() {
  PLAYERS.filter(p=>p.bot).forEach(p=>{
    const max=Math.min(p.balance,300);
    const b=Math.floor(Math.random()*max*0.5)+30;
    if (p.balance>=b){p.bet+=b;p.balance-=b;}
  });
}

function startTimer() {
  clearInterval(timerInterval);
  timer=30;updateTimerDisplay();
  timerInterval=setInterval(()=>{
    timer--;updateTimerDisplay();
    if (timer<=0){clearInterval(timerInterval);if(!spinning&&total()>0)spin();}
  },1000);
}

function updateTimerDisplay() {
  const el=document.getElementById('timerOverlay');
  el.textContent=timer>0?(timer<10?'0'+timer:timer):'...';
  el.style.color=timer<=10?'#f87171':'#fff';
}

function spin() {
  if (spinning) return;
  clearInterval(timerInterval);
  const t=total();
  if (t===0){startTimer();return;}
  spinning=true;
  document.getElementById('winnerBox').classList.remove('show');
  document.getElementById('roundStatus').textContent='Крутим!';

  const rand=Math.random()*t;
  let acc=0,winner=PLAYERS[0];
  for (const p of PLAYERS){acc+=p.bet;if(rand<acc){winner=p;break;}}

  let wMid=0,a=0;
  for (const p of PLAYERS){
    if (!p.bet) continue;
    const s=(p.bet/t)*Math.PI*2;
    if (p.id===winner.id){wMid=a+s/2;break;}
    a+=s;
  }

  const target=-Math.PI/2-wMid;
  const extra=(Math.floor(Math.random()*3)+5)*Math.PI*2;
  const final=target+extra;
  const dur=4200,t0=performance.now(),a0=angle;
  const timerEl=document.getElementById('timerOverlay');
  timerEl.textContent='🎡';

  function go(now){
    const el=now-t0,prog=Math.min(el/dur,1);
    const ease=1-Math.pow(1-prog,4);
    angle=a0+(final-a0)*ease;
    drawWheel();
    if (prog<1){requestAnimationFrame(go);return;}
    angle=final%(Math.PI*2);
    spinning=false;
    winner.balance+=t;

    const myBet=PLAYERS[0].bet||0;
    const won=winner.id==='you';
    const entry={round,bet:myBet,bank:t,prize:t,won,time:new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'})};
    window._addHistory?.(entry);

    const s=window._getStats();
    s.games++;if(won)s.wins++;
    window._setStats(s);
    window._setBalance(PLAYERS[0].balance);
    window._saveUser?.();

    document.getElementById('wName').textContent=winner.name+' победил!';
    document.getElementById('wSub').textContent=`Выиграл ${t} монет · шанс был ${pct(winner)}%`;
    document.getElementById('winnerBox').classList.add('show');
    PLAYERS.forEach(p=>p.bet=0);
    round++;
    document.getElementById('roundStatus').textContent='Сбор ставок';

    setTimeout(()=>{botsBet();render();startTimer();},1200);
  }
  requestAnimationFrame(go);
}
</script>
</body>
</html>
